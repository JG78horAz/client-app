<header class="app-header">
  <div class="app-header-inner">
    <a routerLink="/restaurants" class="brand">
      <span class="brand-mark">B</span>
      <span class="brand-text">
        <strong>BITE</strong>
        <small>Takeaway-Bestellsystem</small>
      </span>
    </a>

    <nav class="main-nav">
      <a routerLink="/restaurants">Restaurants</a>
      <a routerLink="/order">Bestellung</a>

      @if (authService.authenticated()) {
        <a routerLink="/admin">Restaurant-Verwaltung</a>
      }
    </nav>

    <div class="auth-actions">
      @if (authService.authenticated()) {
        <span class="login-name">
          {{ authService.userName() }}
        </span>

        <button type="button" class="auth-button" (click)="authService.logout()">
          Logout
        </button>
      } @else {
        <button type="button" class="auth-button" (click)="authService.login()">
          Login
        </button>
      }
    </div>
  </div>
</header>

<main class="app-main">
  <router-outlet></router-outlet>
</main>
